name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run linter
        run: flake8 lambda/ tests/ --max-line-length=100 --exclude=lambda/testing/package

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install type checker
        run: pip install mypy boto3-stubs types-requests

      - name: Run type checker
        run: mypy lambda/ --ignore-missing-imports --explicit-package-bases --exclude lambda/testing/package

  test:
    name: Test and Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov boto3 requests moto
          pip install -r lambda/collection/requirements.txt
          pip install -r lambda/retrieval/requirements.txt
          pip install -r lambda/analytics/requirements.txt

      - name: Run tests with coverage
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
        run: |
          pytest tests/ \
            --cov=lambda \
            --cov-report=term-missing \
            --cov-report=xml \


      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  e2e:
    name: E2E Testing Microservice
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Invoke testing Lambda
        id: invoke
        run: |
          aws lambda invoke \
            --function-name housing-api-testing-dev \
            --payload '{}' \
            --cli-binary-format raw-in-base64-out \
            response.json

          echo "Lambda response saved to response.json"
          cat response.json

      - name: Set up Python for PDF generation
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDF dependencies
        run: pip install fpdf2

      - name: Generate PDF report
        run: python scripts/generate_report.py response.json test_report.pdf

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test_report.pdf

      - name: Fail pipeline if tests failed
        run: |
          STATUS=$(python -c "
          import json
          with open('response.json') as f:
              data = json.load(f)
          body = json.loads(data.get('body', '{}'))
          summary = body.get('summary', {})
          failed = summary.get('failed', 0) + summary.get('errored', 0)
          print(failed)
          ")
          echo "Failed tests: $STATUS"
          if [ "$STATUS" -gt "0" ]; then
            echo "Tests failed — blocking pipeline"
            exit 1
          fi