openapi: 3.0.0
info:
  title: CloudBelly Housing Events API
  description: "An Event Intelligence API providing Australian housing market data, analytics, and trends."
  version: 1.0.0
servers:
- url: https://tvfiek3hzi.execute-api.us-east-1.amazonaws.com/dev
  description: Production server
paths:
  /api/v1/events:
    get:
      tags:
      - Events
      summary: Get housing events
      description: "Returns all housing events for a given suburb, optionally filtered by date range and price."
      parameters:
      - name: suburb
        in: query
        required: true
        schema:
          type: string
        example: Randwick
      - name: state
        in: query
        required: false
        schema:
          type: string
        example: NSW
      - name: startDate
        in: query
        required: false
        schema:
          type: string
          format: date
        example: 2024-01-01
      - name: endDate
        in: query
        required: false
        schema:
          type: string
          format: date
        example: 2024-06-30
      - name: minPrice
        in: query
        required: false
        schema:
          type: number
        example: 500000
      - name: maxPrice
        in: query
        required: false
        schema:
          type: number
        example: 1500000
      responses:
        "200":
          description: A list of housing events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200"
        "400":
          description: Missing or invalid parameters
        "500":
          description: Internal server error
  /api/v1/datasets:
    get:
      tags:
      - Datasets
      summary: Get dataset metadata
      description: "Returns metadata about the housing data available through this API, including the data source, geographic coverage, date range, and collection frequency."
      responses:
        "200":
          description: Dataset metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_1"
        "500":
          description: Internal server error
  /api/v1/analytics/price-trend:
    get:
      tags:
      - Analytics
      summary: Get price trend data
      description: "Returns price trend data over time for a given suburb, ready to plot as a chart."
      parameters:
      - name: suburb
        in: query
        required: true
        schema:
          type: string
        example: Randwick
      - name: state
        in: query
        required: false
        schema:
          type: string
        example: NSW
      - name: from
        in: query
        required: false
        schema:
          type: string
          format: date
        example: 2024-01-01
      - name: to
        in: query
        required: false
        schema:
          type: string
          format: date
        example: 2024-06-30
      responses:
        "200":
          description: Price trend data in Chart.js format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_2"
        "400":
          description: Missing or invalid parameters
        "500":
          description: Internal server error
  /api/v1/analytics/summary:
    get:
      tags:
      - Analytics
      summary: Get summary statistics
      description: "Returns summary statistics for a given suburb including min, max, average, and median price."
      parameters:
      - name: suburb
        in: query
        required: true
        schema:
          type: string
        example: Randwick
      - name: state
        in: query
        required: false
        schema:
          type: string
        example: NSW
      - name: from
        in: query
        required: false
        schema:
          type: string
          format: date
        example: 2024-01-01
      - name: to
        in: query
        required: false
        schema:
          type: string
          format: date
        example: 2024-06-30
      responses:
        "200":
          description: Summary statistics in Chart.js format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_3"
        "400":
          description: Missing or invalid parameters
        "500":
          description: Internal server error
components:
  schemas:
    HousingEvent:
      type: object
      properties:
        location:
          type: string
          example: NSW#Newtown
        eventKey:
          type: string
          example: 2024-03-15#evt_001
        date:
          type: string
          format: date
          example: 2024-03-15
        price:
          type: number
          example: 950000
        state:
          type: string
          example: NSW
        suburb:
          type: string
          example: Newtown
        property_type:
          type: string
          example: house
    inline_response_200:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/HousingEvent"
    inline_response_200_1:
      type: object
      properties:
        source:
          type: string
          example: Australian Bureau of Statistics (ABS)
        suburbs_covered:
          type: array
          example:
          - Randwick
          - Surry Hills
          - Newtown
          items:
            type: string
        date_range:
          $ref: "#/components/schemas/inline_response_200_1_date_range"
        collection_frequency:
          type: string
          example: weekly
    inline_response_200_2:
      type: object
      properties:
        labels:
          type: array
          example:
          - 2024-01-15
          - 2024-02-20
          items:
            type: string
        datasets:
          type: array
          items:
            $ref: "#/components/schemas/inline_response_200_2_datasets"
    inline_response_200_3:
      type: object
      properties:
        labels:
          type: array
          example:
          - Newtown
          items:
            type: string
        datasets:
          type: array
          items:
            $ref: "#/components/schemas/inline_response_200_3_datasets"
    inline_response_200_1_date_range:
      type: object
      properties:
        earliest:
          type: string
          format: date
          example: 2023-01-01
        latest:
          type: string
          format: date
          example: 2024-12-31
    inline_response_200_2_datasets:
      type: object
      properties:
        label:
          type: string
          example: Newtown
        data:
          type: array
          example:
          - 950000
          - 1020000
          items:
            type: number
    inline_response_200_3_data:
      type: object
      properties:
        min:
          type: number
          example: 600000
        q1:
          type: number
          example: 750000
        median:
          type: number
          example: 900000
        q3:
          type: number
          example: 1100000
        max:
          type: number
          example: 2000000
    inline_response_200_3_datasets:
      type: object
      properties:
        label:
          type: string
          example: NSW#Newtown
        data:
          type: array
          items:
            $ref: "#/components/schemas/inline_response_200_3_data"
